<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
<!-- animation -->
 <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
  />
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <!-- Style Sheet -->
  <link rel="stylesheet" href="style.css">
  <!-- Font -->
   <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Overpass:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <title>Frontend Mentor | Interactive rating component</title>

</head>
<body>

  <!-- Rating state start -->

  <main class="container">
    <div class="rating-content">
      <div class="star">
        <img src="images/icon-star.svg" alt="star-icon">
      </div>
      <h1>How did we do?</h1>
      <p>
        Please let us know how we did with your support request. All feedback is appreciated
        to help us improve our offering!
      </p>
      <section class="ratings">
        <div class="rating-number">1</div>
        <div class="rating-number">2</div>
        <div class="rating-number">3</div>
        <div class="rating-number">4</div>
        <div class="rating-number">5</div>
      </section>
      <button>Submit</button>
    </div>
    <div class="thanks-page hidden ">
      <img class="animate__animated animate__bounceIn" src="images/illustration-thank-you.svg         " alt="">
        <div class="selected-rating-container">You selected <span id="selected-rating"></span>out of 5</div>
      
        <h2 class="animate__animated animate__zoomInDown
       ">Thank you!</h2>
      
        <p>
          We appreciate you taking the time to give a rating. If you ever need more support,
          don’t hesitate to get in touch!
        </p>
    </div>
  </main>

  <!-- Rating state end -->

  <!-- Thank you state start -->

  <!-- Thank you state end -->
<script src="script.js"></script>
  
</body>
</html>
